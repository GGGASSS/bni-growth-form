<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BNI SUPREME - GROWTH Connect</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; padding: 40px; border-radius: 16px; border-top: 6px solid #9E1B22; }
        .group { margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <form id="bniGrowthForm">
            <h2 style="text-align:center;">BNI SUPREME</h2>
            <div class="group"><label>ชื่อ-นามสกุล</label><input type="text" name="fullName" required></div>
            <div class="group"><label>ชื่อเล่น</label><input type="text" name="nickname" required></div>
            <div class="group"><label>Power Team</label>
                <select name="powerTeam" required>
                    <option value="">เลือก...</option>
                    <option value="FACTORY">FACTORY</option>
                    <option value="HORECA">HORECA</option>
                    <option value="LONGEVITY">LONGEVITY</option>
                    <option value="HOSPITAL">HOSPITAL</option>
                    <option value="HI Way">HI Way</option>
                    <option value="Well Being">Well Being</option>
                    <option value="None">None</option>
                    <option value="8 Weeks">8 Weeks</option>
                </select>
            </div>
            <div class="group"><label>ยอดเป้าหมาย</label><input type="text" name="goalAmount" required></div>
            <div class="group"><label>Looking for</label><input type="text" name="lookingFor" required></div>
            <button type="submit" style="width:100%; padding:15px; background:#9E1B22; color:white; border:none; border-radius:8px;">บันทึกข้อมูล</button>
        </form>
    </div>
    <script>
        const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbzBY27_E-A12L9pOWZJlYXoven7ybsoYci4KqAXKRc1viBqPt8iAG_HLl9XJe4l6fHa9g/exec";
        document.getElementById('bniGrowthForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch(SHEET_ENDPOINT, { method: 'POST', mode: 'no-cors', body: new FormData(this) })
            .then(() => alert("บันทึกแล้ว")).catch(() => alert("ผิดพลาด"));
        });
    </script>
</body>
</html>
